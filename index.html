<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening in Obsidian…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      max-width: 420px;
      padding: 2rem;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p { color: #a6adc8; font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.5rem; }
    a.btn {
      display: inline-block;
      background: #7c3aed;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    a.btn:hover { background: #6d28d9; }
    .meta { font-size: 0.8rem; color: #585b70; margin-top: 2rem; }
    .meta a { color: #585b70; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💎</div>
    <h1>Opening in Obsidian…</h1>
    <p id="info">Redirecting you to your note.</p>
    <a id="open-btn" class="btn" href="#">Open in Obsidian</a>
    <div class="meta">
      <p id="note-path"></p>
      <p style="margin-top:0.5rem">Paste any <code>obsidian://</code> URL after the domain to open it.<br>
      <a href="https://github.com/mortenjust/obsidian-launcher">Source</a></p>
    </div>
  </div>
  <script>
    (function() {
      // Everything after the first / becomes the obsidian:// URI
      // e.g. https://domain.com/open?vault=X&file=Y → obsidian://open?vault=X&file=Y
      const raw = location.pathname.slice(1) + location.search + location.hash;

      if (!raw) {
        document.getElementById('info').textContent = 'Add an Obsidian path after the URL to open a note.';
        document.getElementById('open-btn').style.display = 'none';
        return;
      }

      const obsidianUrl = 'obsidian://' + raw;
      const btn = document.getElementById('open-btn');
      btn.href = obsidianUrl;

      // Show the note path
      const params = new URLSearchParams(location.search);
      const file = params.get('file');
      if (file) {
        document.getElementById('note-path').textContent = file.replace(/%20/g, ' ');
      }

      // Auto-redirect
      window.location.href = obsidianUrl;
    })();
  </script>
</body>
</html>
